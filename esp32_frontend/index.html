<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>커뮤니티 사이트</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>🌐 커뮤니티</h1>
            <div id="headerAuth"></div>
        </div>
    </header>

    <div class="container">
        <section class="board-section">
            <div class="board-header">
                <h2>📝 게시판</h2>
                <button class="btn-write" id="btnWrite" style="display: none;">글쓰기</button>
            </div>
            <div id="postList" class="post-list"></div>
        </section>
    </div>

    <!-- 로그인 모달 -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h2>로그인</h2>
            <div id="loginError" class="error-message"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label>아이디</label>
                    <input type="text" id="loginId" required>
                </div>
                <div class="form-group">
                    <label>비밀번호</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-submit">로그인</button>
                    <button type="button" class="btn-cancel" onclick="closeModal('loginModal')">취소</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 회원가입 모달 -->
    <div id="signupModal" class="modal">
        <div class="modal-content">
            <h2>회원가입</h2>
            <div id="signupError" class="error-message"></div>
            <form id="signupForm">
                <div class="form-group">
                    <label>아이디</label>
                    <input type="text" id="signupId" required>
                </div>
                <div class="form-group">
                    <label>비밀번호</label>
                    <input type="password" id="signupPassword" required>
                </div>
                <div class="form-group">
                    <label>닉네임</label>
                    <input type="text" id="signupNickname" required>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-submit">가입하기</button>
                    <button type="button" class="btn-cancel" onclick="closeModal('signupModal')">취소</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 글쓰기 모달 -->
    <div id="writeModal" class="modal">
        <div class="modal-content">
            <h2>글쓰기</h2>
            <form id="writeForm">
                <div class="form-group">
                    <label>제목</label>
                    <input type="text" id="postTitle" required>
                </div>
                <div class="form-group">
                    <label>내용</label>
                    <textarea id="postContent" style="width: 100%; height: 150px; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-family: inherit;" required></textarea>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-submit">작성</button>
                    <button type="button" class="btn-cancel" onclick="closeModal('writeModal')">취소</button>
                </div>
            </form>
        </div>
    </div>

    <!-- JavaScript 파일들을 순서대로 로드 -->
    <script src="auth.js"></script>
    <script src="board.js"></script>
    <script src="main.js"></script>
</body>
</html>
